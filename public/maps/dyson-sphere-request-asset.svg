  <g class="label">
    <text x="96" y="112" fill="#263247" font-size="29" font-weight="800">Central Synaptic Intelligence Systems</text>
    <text x="96" y="148" fill="#596172" font-size="18">Refined physical map asset • Git-safe SVG transcription • 1-second metering anchorage</text>
    <text x="96" y="1690" fill="#263247" font-size="16" class="caption">ANCHORAGE GRID / PRIVATE ADMIN ASSOCIATED</text>
