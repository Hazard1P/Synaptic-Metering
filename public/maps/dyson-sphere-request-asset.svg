  <rect x="92" y="84" width="1016" height="1624" rx="12" fill="none" stroke="#b9aa74" stroke-width="2" opacity=".55"/>
  <rect x="72" y="64" width="1056" height="1664" rx="18" fill="transparent" filter="url(#paperGrain)" opacity=".42"/>

