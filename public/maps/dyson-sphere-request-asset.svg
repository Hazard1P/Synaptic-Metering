<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1800" role="img" aria-labelledby="title desc">
  <title id="title">Refined Dyson Sphere Anchorage Star Map Asset</title>
  <desc id="desc">A Git-safe vector reconstruction of the provided physical star-map image, refined with layered paper texture, orbital geometry, constellation anchors, and a one-second metering anchorage motif.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf7"/>
      <stop offset="0.48" stop-color="#f5f0df"/>
      <stop offset="1" stop-color="#e8dfc4"/>
    </linearGradient>
    <radialGradient id="void" cx="50%" cy="45%" r="70%">
      <stop offset="0" stop-color="#354264"/>
      <stop offset="0.55" stop-color="#151827"/>
      <stop offset="1" stop-color="#090a11"/>
    </radialGradient>
    <radialGradient id="earthGlow" cx="38%" cy="32%" r="68%">
      <stop offset="0" stop-color="#69d0ff"/>
      <stop offset="0.58" stop-color="#208be7"/>
      <stop offset="1" stop-color="#0b3d91"/>
    </radialGradient>
    <radialGradient id="sunCore" cx="38%" cy="35%" r="64%">
      <stop offset="0" stop-color="#ffe99f"/>
      <stop offset="0.45" stop-color="#eeb442"/>
      <stop offset="1" stop-color="#b86124"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17130c" flood-opacity="0.22"/>
    </filter>
    <filter id="paperGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.08" numOctaves="2" seed="41" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="0 0 0 0 0.62 0 0 0 0 0.55 0 0 0 0 0.38 0 0 0 .16 0"/>
    </filter>
    <style>
      .ink{stroke:#141416;stroke-linecap:round;stroke-linejoin:round}.label{font-family:Inter, system-ui, Segoe UI, Arial, sans-serif}.caption{letter-spacing:.08em;text-transform:uppercase}.small-star{fill:#172034}.gold{stroke:#cdb84e}.nav{stroke:#5f6680;stroke-dasharray:6 10}.fine{stroke-width:2}.route{fill:none;stroke:#d8ca64;stroke-width:9;stroke-linecap:round;stroke-dasharray:1 18}.orbit{fill:none;stroke:#24324d;stroke-width:4;stroke-dasharray:10 12;opacity:.78}
    </style>
  </defs>
